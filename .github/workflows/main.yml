name: CSV Processing Workflow

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: "Google Drive File URL"
        required: true

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      # 🔥 NEW STEP: Download file from Google Drive
      - name: Download CSV from Drive
        run: |
          echo "Downloading file..."
          curl -L "${{ github.event.inputs.file_url }}" -o input.csv

      # 🔥 OPTIONAL: Debug (helps if something breaks)
      - name: Verify File
        run: |
          echo "File preview:"
          head -n 5 input.csv

      - name: Run Script
        env:
          FILE_PATH: input.csv   # ✅ pass file path instead of base64
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: python masterupload.py
        
